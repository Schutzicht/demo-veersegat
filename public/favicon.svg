<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- App-icon achtergrond -->
  <rect width="64" height="64" rx="12" fill="#FFFFFF"/>

  <!-- Mast door de zon heen -->
  <rect x="31" y="6" width="2" height="40" fill="#1F76C2"/>

  <!-- Vlaggetje aan de top -->
  <path d="M33 7 L43 11 L33 15 Z" fill="#E2231A"/>

  <!-- Zon (achter zeil + romp) -->
  <circle cx="32" cy="30" r="17" fill="#E2231A"/>

  <!-- Zeil (wit), apex onder vlaggetje -->
  <path d="M15 44 L31 17 L31 44 Z" fill="#FFFFFF"/>
  <path d="M31 17 L31 44 L47 44 Z" fill="#FFFFFF"/>
  <path d="M15 44 L31 17 L31 44 Z" fill="#1F76C2" opacity="0.16"/>

  <!-- Romp -->
  <path d="M9 47 H55 L47 57 H17 Z" fill="#1F76C2"/>

  <!-- Water-rimpel -->
  <path d="M7 60 Q20 57 32 60 T57 60" stroke="#1F76C2" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
</svg>
